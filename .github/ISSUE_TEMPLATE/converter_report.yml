body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing a Micro HDMI to VGA converter.

        Please provide as much information as possible so other users can reproduce your setup and results.

  - type: input
    id: converter_name
    attributes:
      label: Converter name
      description: Product name as listed by the seller or manufacturer.
      placeholder: Official Raspberry Pi Micro-HDMI to VGA Cable
    validations:
      required: true

  - type: input
    id: manufacturer
    attributes:
      label: Manufacturer / Brand
      placeholder: Raspberry Pi Ltd., UGREEN, Benfei, Twozoh

  - type: input
    id: product_link
    attributes:
      label: Product link
      placeholder: https://...

  - type: input
    id: price
    attributes:
      label: Price paid
      placeholder: 8 €

  - type: dropdown
    id: vga_pin9
    attributes:
      label: VGA Pin 9 (+5V available)
      options:
        - "Yes"
        - "No"
        - "Unknown"
    validations:
      required: true

  - type: dropdown
    id: result
    attributes:
      label: Test result
      options:
        - "Working"
        - "Working with issues"
        - "Not working"
        - "Ordered, not tested yet"
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Test setup
      description: Describe your hardware setup.
      placeholder: |
        Raspberry Pi model: Raspberry Pi 4B 4GB
        HDMI output: HDMI-1 / HDMI-2
        Converter:
        Sync combiner version:
        RNS-E model:
        Power source:

  - type: textarea
    id: image_quality
    attributes:
      label: Image quality observations
      placeholder: |
        Stable image
        Occasional picture interruptions
        Flickering
        Black lines
        Color issues
        No image

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional notes
      placeholder: Any other observations or measurements.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have personally tested this converter.
          required: true
