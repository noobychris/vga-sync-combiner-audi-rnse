name: Micro HDMI to VGA Converter Report
description: Report a tested Micro HDMI to VGA converter.
title: "[Converter Report]: "
labels:
  - compatibility
body:
  - type: input
    id: converter_name
    attributes:
      label: Converter name
      placeholder: Official Raspberry Pi Micro-HDMI to VGA Cable
    validations:
      required: true

  - type: input
    id: purchase_link
    attributes:
      label: Product link
      placeholder: https://...

  - type: input
    id: price
    attributes:
      label: Price paid
      placeholder: 8 €

  - type: dropdown
    id: pin9
    attributes:
      label: VGA Pin 9 (+5V)
      options:
        - Yes
        - No
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - Working
        - Working with issues
        - Not working
        - Ordered, not tested yet
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Test setup
      placeholder: |
        Raspberry Pi model:
        HDMI to VGA converter:
        Sync combiner version:
        RNS-E model:

  - type: textarea
    id: issues
    attributes:
      label: Observed issues
      placeholder: |
        Picture interruptions
        Flickering
        No image
        Stable image

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional notes
